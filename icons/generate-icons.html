<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<p>Generating icons... check the console and download links below.</p>
<canvas id="c192" width="192" height="192" style="border:1px solid #ccc"></canvas>
<canvas id="c512" width="512" height="512" style="border:1px solid #ccc"></canvas>
<br><br>
<a id="dl192" download="icon-192.png">Download icon-192.png</a><br>
<a id="dl512" download="icon-512.png">Download icon-512.png</a>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  // Background
  ctx.fillStyle = '#1a1a1a';
  const r = s * 0.19;
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();
  // Emoji
  ctx.font = `${s * 0.58}px system-ui`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🔥', s / 2, s / 2 + s * 0.04);
}

const c192 = document.getElementById('c192');
const c512 = document.getElementById('c512');
drawIcon(c192);
drawIcon(c512);

document.getElementById('dl192').href = c192.toDataURL('image/png');
document.getElementById('dl512').href = c512.toDataURL('image/png');
</script>
</body>
</html>
